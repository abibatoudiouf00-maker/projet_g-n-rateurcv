<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de cv</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="logo"> CV<span>Pro</span></div>
    <div class="h-btns">
        <button class="btn btn-o" onclick="App.reset()">↺ Réinitialiser</button>
        <button class="btn btn-o" onclick="Server.save()">☁ Sauver</button>
        <button class="btn btn-g" onclick="PDF.go()">⬇ Exporter PDF</button>
    </div>
</header>

<div class="shell">

    <div class="editor">
        <div class="steps">
            <button class="step on" data-i="0"><span class="step-n">1</span>Profil</button>
            <button class="step" data-i="1"><span class="step-n">2</span>Parcours</button>
            <button class="step" data-i="2"><span class="step-n">3</span>Compétences</button>
            <button class="step" data-i="3"><span class="step-n">4</span>Style</button>
        </div>

        <div class="ebody">
            <div class="sc on" id="sc-0">
                <p class="stl">Informations personnelles</p>
                <div class="photo-row">
                    <div class="photo-circle" onclick="document.getElementById('photo-input').click()">
                        <img id="photo-img" src="" style="display:none;width:100%;height:100%;object-fit:cover">
                        <span id="photo-ph">+<br>Photo</span>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:.35rem">
                        <label class="lbl-btn" for="photo-input">Choisir une photo</label>
                        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="App.photo(event)">
                        <button class="ghost" onclick="App.rmPhoto()">Supprimer</button>
                    </div>
                </div>
  <div class="grid">
<div class="f x2">
      <label>Prénom & Nom <span class="req">*</span></label>
      <input type="text" id="f-name" placeholder="Fatou Diallo" oninput="Store.save()">
      <span class="ferr" id="err-name"></span>
</div>
<div class="f x2">
  <input type="text" id="f-job" placeholder="Développeuse Full Stack" oninput="Store.save()">">
</div>
<div class="f">
    <label>Email <span class="req">*</span></label>
    <input type="email" id="f-email" placeholder="fatou@example.com" oninput="Store.save()">
    <span class="ferr" id="err-email"></span>
</div>
<div class="f">
    <label>Téléphone <span class="req">*</span></label>
    <input type="tel" id="f-phone" placeholder="77 123 45 67" oninput="Store.save()">
    <span class="ferr" id="err-phone"></span>
</div>
<div class="f">
      <label>Ville</label>
      <input type="text" id="f-city" placeholder="Dakar, Sénégal" oninput="Store.save()">
</div>
<div class="f">
      <label>LinkedIn / Site</label>
      <input type="text" id="f-web" placeholder="linkedin.com/in/fatou" oninput="Store.save()">
</div>
<div class="f x2">
      <label>Résumé professionnel</label>
      <textarea id="f-summary" rows="4" placeholder="Présentez-vous..." oninput="Store.save()"></textarea>
</div>
  </div>
  <div class="snav"><div></div><button class="btn btn-g" onclick="App.step(1)">Suivant →</button></div>
</div>

<div class="sc" id="sc-1">
  <p class="stl">Expériences professionnelles</p>
  <div id="list-exp"></div>
      <button class="add-btn" onclick="Dyn.exp()">＋ Ajouter une expérience</button>
  <hr>
  <p class="stl">Formation académique</p>
  <div id="list-edu"></div>
      <button class="add-btn" onclick="Dyn.edu()">＋ Ajouter une formation</button>
  <div class="snav">
      <button class="btn btn-o" onclick="App.step(0)">← Précédent</button>
      <button class="btn btn-g" onclick="App.step(2)">Suivant →</button>
  </div>
</div>
 <div class="sc" id="sc-2">
                <p class="stl">Compétences</p>
                <div id="list-skills"></div>
                <button class="add-btn" onclick="Dyn.skill()">＋ Ajouter une compétence</button>
                <hr>
                <p class="stl">Langues</p>
                <div id="list-langs"></div>
                <button class="add-btn" onclick="Dyn.lang()">＋ Ajouter une langue</button>
                <hr>
                <p class="stl">Centres d'intérêt</p>
                <textarea id="f-interests" rows="2" placeholder="Voyages, Sport..." oninput="Store.save()"></textarea>
                <div class="snav">
                    <button class="btn btn-o" onclick="App.step(1)">← Précédent</button>
                    <button class="btn btn-g" onclick="App.step(3)">Suivant →</button>
                </div>
            </div>

            <div class="sc" id="sc-3">
                <p class="stl">Modèle de CV</p>
                <div class="tpl-grid">
                    <div class="tcard on" data-tpl="m" onclick="Style.tpl('m',this)">
                        <div class="tinfo">Moderne (Sidebar)</div>
                    </div>
                    <div class="tcard" data-tpl="e" onclick="Style.tpl('e',this)">
                        <div class="tinfo">Executive (Classique)</div>
                    </div>
                </div>
                <p class="stl" style="margin-top:1.5rem">Couleur d'accent</p>
                <div class="colors">
                    <div class="csw on" data-c="#c9914a" style="background:#c9914a" onclick="Style.color('#c9914a',this)"></div>
                    <div class="csw" data-c="#2d6a8f" style="background:#2d6a8f" onclick="Style.color('#2d6a8f',this)"></div>
                    <div class="csw" data-c="#4a7c59" style="background:#4a7c59" onclick="Style.color('#4a7c59',this)"></div>
                    <div class="csw" data-c="#7b4a8f" style="background:#7b4a8f" onclick="Style.color('#7b4a8f',this)"></div>
                </div>
                <div class="snav">
                    <button class="btn btn-o" onclick="App.step(2)">← Précédent</button>
                    <button class="btn btn-g" onclick="Validate.all()">✓ Générer mon CV</button>
                </div>
            </div>
        </div>
    </div>

    <div class="preview">
        <div class="pbar">
            <span>Aperçu en direct</span>
            <div class="zbtns">
                <button onclick="UI.z(-.1)">−</button>
                <span class="zval" id="zval">85%</span>
                <button onclick="UI.z(.1)">+</button>
            </div>
        </div>
        <div class="stage">
            <div class="cvsheet" id="cv"></div>
        </div>
    </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
